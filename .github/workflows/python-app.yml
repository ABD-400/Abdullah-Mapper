name: Build Abdullah Mapper APK
on: [push, pull_request]

jobs:
  build:
    # استخدام نسخة 22.04 لحل مشكلة الحزم المفقودة
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK
        run: |
          # الموافقة التلقائية على تراخيص الـ SDK
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Abdullah-Mapper-APK
          path: bin/*.apk
